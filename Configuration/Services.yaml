services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  T3x\StaticHtmlImporter\:
    resource: '../Classes/*'
    exclude:
      - '../Classes/Domain/Model/*'

  T3x\StaticHtmlImporter\Command\:
    resource: '../Classes/Command/*'
    public: true
    tags: ['console.command']

  # Production AiClassifier wraps b13/aim. Tests inject AiClassifierMock
  # directly, no DI alias swap needed.
  T3x\StaticHtmlImporter\Service\Ai\AiClassifierInterface:
    alias: T3x\StaticHtmlImporter\Service\Ai\AiClassifier

  T3x\StaticHtmlImporter\Service\Mapping\FieldTransformerInterface:
    alias: T3x\StaticHtmlImporter\Service\Mapping\FieldTransformer

  T3x\StaticHtmlImporter\Service\Import\ContentImporterInterface:
    alias: T3x\StaticHtmlImporter\Service\Import\ContentImporter

  T3x\StaticHtmlImporter\Service\Import\DataHandlerAdapterInterface:
    alias: T3x\StaticHtmlImporter\Service\Import\DataHandlerAdapter

  T3x\StaticHtmlImporter\Service\Template\FluidPartialGeneratorInterface:
    alias: T3x\StaticHtmlImporter\Service\Template\FluidPartialGenerator

  T3x\StaticHtmlImporter\Service\Import\FalImporterInterface:
    alias: T3x\StaticHtmlImporter\Service\Import\FalImporter
