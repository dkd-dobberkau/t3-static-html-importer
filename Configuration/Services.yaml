services:
  _defaults:
    autowire: true
    autoconfigure: true
    public: false

  T3x\StaticHtmlImporter\:
    resource: '../Classes/*'
    exclude:
      - '../Classes/Domain/Model/*'

  T3x\StaticHtmlImporter\Command\:
    resource: '../Classes/Command/*'
    public: true
    tags: ['console.command']

  # Production AiClassifier wraps b13/aim. Tests inject AiClassifierMock
  # directly, no DI alias swap needed.
  T3x\StaticHtmlImporter\Service\Ai\AiClassifierInterface:
    alias: T3x\StaticHtmlImporter\Service\Ai\AiClassifier
