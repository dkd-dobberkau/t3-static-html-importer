name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ['8.2', '8.3', '8.4']

    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: dom, mbstring, xml
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --no-check-publish

      - name: Get composer cache dir
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"

      - name: Cache composer dependencies
        uses: actions/cache@v5
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ matrix.php }}-${{ hashFiles('**/composer.json') }}
          restore-keys: ${{ runner.os }}-composer-${{ matrix.php }}-

      - name: Install dependencies
        # --no-plugins disables TYPO3's asset:publish post-install hook, which
        # needs a full TYPO3 site. The autoloader (PSR-4 from composer.json)
        # works without the plugin, so unit tests run fine.
        run: composer install --no-progress --no-plugins --no-scripts --no-interaction --prefer-dist

      - name: Lint PHP files
        run: find Classes Tests -name '*.php' -print0 | xargs -0 -n1 -P4 php -l > /dev/null

      - name: Run PHPUnit
        run: vendor/bin/phpunit

      - name: Audit composer dependencies
        run: composer audit --abandoned=ignore
        continue-on-error: true
