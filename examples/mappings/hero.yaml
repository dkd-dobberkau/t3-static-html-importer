# Mapping for hero blocks (data-component="hero").
cType: hero

# CSS-style hint the analyzer can use to pre-filter candidate blocks.
selector: 'section[data-component="hero"]'

fields:
  header:
    description: 'The hero headline (first h1, h2 or h3).'
    type: string

  bodytext:
    description: 'The hero body text, preserving inline emphasis and links.'
    type: html

  image:
    description: 'The hero image (FAL-imported, sys_file_reference is created automatically).'
    type: image
